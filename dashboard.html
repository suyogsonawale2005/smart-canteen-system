<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Smart Canteen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="container nav-container">
            <a href="#" class="nav-brand">
                <i class="fa-solid fa-burger"></i>
                Smart Canteen
            </a>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle-nav" aria-label="Toggle theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="cart-btn" id="cart-toggle">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>
                
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-role" id="user-role">Student</div>
                    </div>
                </div>
                <button class="btn btn-outline" style="width: auto; padding: 0.5rem 1rem;" onclick="window.logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-main container">
        <div class="animate-fade-in" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <h1 class="section-title">What are you craving today? 😋</h1>
            <button class="btn btn-primary" style="width: auto;" onclick="toggleOrdersList()">
                <i class="fa-solid fa-clock-rotate-left"></i> Track Orders
            </button>
        </div>
            <!-- Search and Filter Bar -->
            <div style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
                <div style="position: relative; margin-bottom: 1rem;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="menu-search" class="form-input" placeholder="Search for dishes, categories, or ingredients..." style="padding-left: 2.75rem; border-radius: var(--radius-full); box-shadow: var(--shadow-sm);">
                </div>
                <div style="display: flex; gap: 1rem; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                    <!-- Category Filter -->
                    <div class="category-filter" style="flex: 1; margin-bottom: 0;">
                        <button class="category-btn active" data-cat="all"><i class="fa-solid fa-utensils"></i> All</button>
                        <button class="category-btn" data-cat="cat-breakfast"><i class="fa-solid fa-mug-saucer"></i> Breakfast</button>
                        <button class="category-btn" data-cat="cat-meals"><i class="fa-solid fa-bowl-rice"></i> Lunch</button>
                        <button class="category-btn" data-cat="cat-snacks"><i class="fa-solid fa-cookie-bite"></i> Snacks</button>
                        <button class="category-btn" data-cat="cat-beverages"><i class="fa-solid fa-glass-water"></i> Beverages</button>
                        <button class="category-btn" data-cat="cat-chinese"><i class="fa-solid fa-bowl-food"></i> Chinese</button>
                        <button class="category-btn" data-cat="cat-fastfood"><i class="fa-solid fa-burger"></i> Fast Food</button>
                    </div>

                    <!-- Food Type Filter -->
                    <div style="display: flex; gap: 0.5rem; background: var(--surface); padding: 0.5rem; border-radius: var(--radius-full); box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
                        <button class="type-btn" data-type="veg" style="padding: 0.5rem 1rem; border-radius: var(--radius-full); border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;"><i class="fa-solid fa-leaf"></i> Veg</button>
                        <button class="type-btn" data-type="non-veg" style="padding: 0.5rem 1rem; border-radius: var(--radius-full); border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;"><i class="fa-solid fa-drumstick-bite"></i> Non-Veg</button>
                    </div>
                </div>
            </div>

        <!-- Menu Section -->
        <section class="menu-section animate-fade-in delay-1">
            <div class="menu-grid" id="menu-grid">
                <!-- Food Cards will be injected dynamically via JS -->
            </div>
        </section>

        <!-- Order Tracking Modal (Hidden by default) -->
        <div id="orders-modal" class="order-tracking-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
            <div class="modal-content animate-fade-in" style="background: var(--surface); width: 90%; max-width: 600px; max-height: 80vh; border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-lg);">
                <div class="modal-header" style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="font-size: 1.25rem;"><i class="fa-solid fa-utensils" style="color: var(--primary);"></i> Your Active Orders</h2>
                    <button class="close-modal" onclick="toggleOrdersList()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="orders-list" style="padding: 1.5rem; overflow-y: auto; flex: 1;">
                    <p style="text-align: center; color: var(--text-light);">Loading orders...</p>
                </div>
            </div>
        </div>

        <!-- Payment Modal -->
        <div id="payment-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(6px);">
            <div class="animate-fade-in" style="background: var(--surface); width: 90%; max-width: 460px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg);">
                <!-- Modal Header -->
                <div style="padding: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; text-align: center;">
                    <i class="fa-solid fa-lock" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i>
                    <h2 style="font-size: 1.25rem; font-weight: 700; color: white;">Secure Checkout</h2>
                    <p style="opacity: 0.85; font-size: 0.9rem;">Choose your payment method</p>
                </div>

                <div style="padding: 1.5rem;">
                    <!-- Order Total -->
                    <div style="background: var(--background); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);">
                        <span style="color: var(--text-muted);">Order Total</span>
                        <span id="payment-total" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">₹0.00</span>
                    </div>

                    <!-- Payment Options -->
                    <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem;">
                        <!-- UPI -->
                        <label class="payment-option" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
                            <input type="radio" name="payment-method" value="upi" style="accent-color: var(--primary); width: 18px; height: 18px;" checked>
                            <div style="background: #00a0e9; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                <i class="fa-solid fa-mobile-screen-button" style="color: white;"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">UPI</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">GPay, PhonePe, Paytm</div>
                            </div>
                        </label>

                        <!-- Card -->
                        <label class="payment-option" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
                            <input type="radio" name="payment-method" value="card" style="accent-color: var(--primary); width: 18px; height: 18px;">
                            <div style="background: #6366f1; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                <i class="fa-solid fa-credit-card" style="color: white;"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">Debit / Credit Card</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">Visa, Mastercard, RuPay</div>
                            </div>
                        </label>

                        <!-- Cash -->
                        <label class="payment-option" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
                            <input type="radio" name="payment-method" value="cash" style="accent-color: var(--primary); width: 18px; height: 18px;">
                            <div style="background: #22c55e; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                <i class="fa-solid fa-indian-rupee-sign" style="color: white;"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">Cash at Counter</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">Pay when you collect</div>
                            </div>
                        </label>
                    </div>

                    <!-- UPI ID input (shows when UPI selected) -->
                    <div id="upi-input-section" style="margin-bottom: 1.5rem;">
                        <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">UPI ID</label>
                        <input type="text" id="upi-id" class="form-input" placeholder="yourname@upi" style="margin-top: 0.4rem;">
                    </div>

                    <!-- Buttons -->
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn btn-outline" style="flex: 1;" onclick="closePaymentModal()">Cancel</button>
                        <button class="btn btn-primary" style="flex: 2;" onclick="confirmPayment()">
                            <i class="fa-solid fa-check-circle"></i> Confirm Payment
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Order Success Full-Screen Modal (Swiggy Style) -->
        <div id="order-success-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; color: white;">
            <div id="success-animation-container" style="text-align: center; transform: scale(0.8); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <div style="width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                    <i class="fa-solid fa-check" style="font-size: 4rem; color: var(--primary);"></i>
                </div>
                <h1 style="font-size: 2.5rem; margin-bottom: 1rem; font-weight: 800;">Order Placed!</h1>
                <p style="font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem;">Sit tight, your delicious food is being prepared.</p>
                <div style="background: rgba(255,255,255,0.15); padding: 1rem 2rem; border-radius: var(--radius-full); display: inline-block; backdrop-filter: blur(10px);">
                    <span style="font-weight: 600;">Order ID:</span> <span id="success-order-id" style="font-weight: 800;">#0000</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2><i class="fa-solid fa-cart-shopping" style="color: var(--primary);"></i> Your Order</h2>
            <button class="close-cart" id="close-cart"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="cart-items" id="cart-items">
            <div class="cart-empty" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-light); gap: 1rem;">
                <i class="fa-solid fa-basket-shopping" style="font-size: 4rem; color: var(--border);"></i>
                <p>Your cart is empty</p>
                <button class="btn btn-outline" style="margin-top: 1rem;" onclick="closeCartSidebar()">Browse Menu</button>
            </div>
        </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span>₹0.00</span>
            </div>
            <button class="btn btn-primary" style="width: 100%; border-radius: var(--radius-full); margin-top: 1rem;" onclick="placeOrder()">
                Place Order <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </aside>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/state.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="script.js"></script>
</body>
</html>
